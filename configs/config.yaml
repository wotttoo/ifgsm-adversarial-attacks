# configs/config.yaml
# ============================================================
# Cấu hình toàn bộ project I-FGSM
# ============================================================

# --- Dataset ---
dataset:
  name: "MNIST"           # MNIST | CIFAR10
  root: "./data"
  batch_size: 64
  num_workers: 2
  val_split: 0.1

# --- Model ---
model:
  name: "SimpleCNN"       # SimpleCNN | ResNet18
  num_classes: 10
  pretrained: false
  checkpoint: null        # path to checkpoint nếu có

# --- Training ---
train:
  epochs: 20
  lr: 0.001
  weight_decay: 1.0e-4
  optimizer: "Adam"       # Adam | SGD
  scheduler: "StepLR"
  step_size: 10
  gamma: 0.1
  save_dir: "./results/checkpoints"

# --- Attack: I-FGSM ---
attack:
  method: "ifgsm"
  epsilon: 0.3            # biên độ nhiễu tối đa
  alpha: 0.01             # bước nhiễu mỗi iteration (= epsilon/num_steps nếu null)
  num_steps: 40           # số bước lặp
  targeted: false         # True = targeted attack
  clip_min: 0.0
  clip_max: 1.0

# --- Experiment ---
experiment:
  name: "ifgsm_mnist"
  epsilon_list: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3]
  steps_list: [5, 10, 20, 40]
  seed: 42
  device: "cuda"          # cuda | cpu | mps
  num_samples: 1000       # số ảnh dùng để eval

# --- Visualization ---
vis:
  num_examples: 10        # số ảnh hiển thị
  save_dir: "./results/figures"
  dpi: 150
